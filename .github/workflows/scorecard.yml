# OpenSSF Scorecard - checks repository supply-chain security posture.
# Private forks cannot publish public Scorecard results or upload SARIF to GitHub
# Code Scanning unless GitHub Code Security / Advanced Security is enabled.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1" # Mondays 07:20 UTC
  push:
    branches: ["main"]

# Read-only by default; the analysis job elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to clone and analyze a private repository.
      contents: read
      # Recommended reads for private repositories to avoid GraphQL/SAST gaps.
      issues: read
      pull-requests: read
      checks: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.json
          results_format: json
          publish_results: false # private repositories cannot publish public Scorecard results
